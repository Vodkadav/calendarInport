name: Refresh calendar

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (deploy gate)
        run: pytest -q

      - name: Refresh data
        run: python scripts/refresh.py

      - name: Generate ICS
        run: python scripts/generate.py

      - name: Stage site
        run: |
          mkdir -p _site/data _site/ics
          cp web/calendar.html _site/index.html
          cp web/calendar.html _site/calendar.html
          cp data/*.json _site/data/
          cp ics/*.ics _site/ics/

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd _site
          git init -b gh-pages
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Refresh $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
